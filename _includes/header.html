<header class="site-header" role="banner">
  <style>
    @media screen and (min-width: 769px) {
      .site-header .wrapper { display: flex; flex-direction: column; }
      .site-title { padding-bottom: 5px; }
      .site-nav { position: static !important; align-self: flex-end; }
      .site-nav .page-link { margin-left: 15px !important; }
    }
  </style>

  <div class="wrapper">
    {% assign lang = page.lang | default: "ko" %}

    {% if lang == "ko" %}
      {% assign home_url = "/why/" %}
    {% else %}
      {% assign home_url = "/why/" | append: lang | append: "/" %}
    {% endif %}

    <a class="site-title" rel="author" href="{{ home_url | relative_url }}">
      {{ site.titles[lang] | default: site.title | escape }}
    </a>

    <nav class="site-nav">
      <input type="checkbox" id="nav-trigger" class="nav-trigger" />
      <label for="nav-trigger">
        <span class="menu-icon">
          <svg viewBox="0 0 18 15" width="18px" height="15px">
            <path d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484l0,0C0,0.665,0.665,0,1.484,0 h15.032C17.335,0,18,0.665,18,1.484L18,1.484z M18,7.516C18,8.335,17.335,9,16.516,9H1.484C0.665,9,0,8.335,0,7.516l0,0 c0-0.82,0.665-1.484,1.484-1.484h15.032C17.335,6.031,18,6.696,18,7.516L18,7.516z M18,13.516C18,14.335,17.335,15,16.516,15H1.484 C0.665,15,0,14.335,0,13.516l0,0c0-0.82,0.665-1.483,1.484-1.483h15.032C17.335,12.031,18,12.695,18,13.516L18,13.516z"/>
          </svg>
        </span>
      </label>

      <div class="trigger">
        <a class="page-link" href="{{ '/why/' | relative_url }}" {% if lang == 'ko' %}style="font-weight: bold; color: #C0392B;"{% endif %}>🇰🇷 한국어</a>
        <a class="page-link" href="{{ '/why/en/' | relative_url }}" {% if lang == 'en' %}style="font-weight: bold; color: #C0392B;"{% endif %}>🇺🇸 English</a>
        <a class="page-link" href="{{ '/why/ja/' | relative_url }}" {% if lang == 'ja' %}style="font-weight: bold; color: #C0392B;"{% endif %}>🇯🇵 日本語</a>
        <a class="page-link" href="{{ '/why/zh-TW/' | relative_url }}" {% if lang == 'zh-TW' %}style="font-weight: bold; color: #C0392B;"{% endif %}>🇹🇼 繁體中文</a>
        <a class="page-link" href="{{ '/why/es/' | relative_url }}" {% if lang == 'es' %}style="font-weight: bold; color: #C0392B;"{% endif %}>🇪🇸 Español</a>
      </div>
    </nav>
  </div>
</header>
