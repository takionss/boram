---
layout: default
---
<article class="post h-entry" itemscope itemtype="http://schema.org/BlogPosting">

  <header class="post-header" style="margin-bottom: 30px;">
    <h1 class="post-title p-name" itemprop="name headline">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {{ page.date | date: "%Y년 %m월 %d일" }}
      </time>
    </p>
  </header>

  <div class="post-content e-content" itemprop="articleBody">
    {{ content }}
  </div>

  <hr style="margin: 50px 0 30px 0; border: 0; border-top: 1px solid #eee;">

  <!-- 랜덤 글 5개 -->
  <div class="random-posts" style="background: #f4f8fa; padding: 20px; border-radius: 8px;">
    <h3 style="margin-top: 0; color: #333;">🎲 다른 흥미로운 이야기도 확인해 보세요!</h3>
    <ul style="list-style: none; padding-left: 0;">
      {% assign random_posts = site.posts | sample: 5 %}
      {% for post in random_posts %}
        <li style="margin-bottom: 10px;">
          <a href="{{ post.url | relative_url }}" style="text-decoration: none; color: #005a87; font-weight: bold;">
            • {{ post.title | escape }}
          </a>
        </li>
      {% endfor %}
    </ul>
  </div>

</article>
